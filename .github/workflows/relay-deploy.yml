name: Deploy OZ Relay

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      - 'deploy/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test relay crates
        run: cargo test -p oz-relay-common -p oz-relay-server

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p oz-relay-server

      - name: Deploy to OZ server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RELAY_SSH_HOST }}
          username: ${{ secrets.RELAY_SSH_USER }}
          key: ${{ secrets.RELAY_SSH_KEY }}
          script: |
            systemctl stop oz-relay-server || true

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.RELAY_SSH_HOST }}
          username: ${{ secrets.RELAY_SSH_USER }}
          key: ${{ secrets.RELAY_SSH_KEY }}
          source: "target/release/oz-relay-server"
          target: "/opt/oz-relay/bin/"
          strip_components: 2

      - name: Restart and verify
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RELAY_SSH_HOST }}
          username: ${{ secrets.RELAY_SSH_USER }}
          key: ${{ secrets.RELAY_SSH_KEY }}
          script: |
            chmod +x /opt/oz-relay/bin/oz-relay-server
            systemctl start oz-relay-server
            sleep 2
            # FIX #13: Check both internal health and external TLS
            curl -sf http://localhost:3400/health || (journalctl -u oz-relay-server -n 20 && exit 1)
            curl -sf https://relay.oz.global/health || echo "WARNING: external TLS health check failed"
            echo "relay server deployed and healthy"
