# nsjail configuration for OZ Relay build sessions
# Each intent submission runs inside this sandbox.

name: "oz-relay-sandbox"
description: "Isolated build environment for intent implementation"

mode: ONCE

# Time limit: 30 minutes
time_limit: 1800

# No network access (the critical security boundary)
clone_newnet: true

# Separate PID namespace
clone_newpid: true

# Mount the worktree read-write (the agent needs to modify code)
mount {
    src: "/opt/arcflow/.relay-worktrees/SESSION_ID"
    dst: "/build"
    is_bind: true
    rw: true
}

# Rust toolchain (read-only)
mount {
    src: "/home/oz-relay/.rustup"
    dst: "/home/oz-relay/.rustup"
    is_bind: true
    rw: false
}

mount {
    src: "/home/oz-relay/.cargo"
    dst: "/home/oz-relay/.cargo"
    is_bind: true
    rw: false
}

# FIX #8: Cargo registry is read-only. Build artifacts go to /tmp tmpfs.
# Pre-populate the registry cache by running a warm-up build before
# accepting intent submissions.
mount {
    src: "/opt/oz-relay/cargo-cache"
    dst: "/home/oz-relay/.cargo/registry"
    is_bind: true
    rw: false
}

# System libraries (read-only)
mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
    rw: false
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
    rw: false
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
    rw: false
}

# /bin and /sbin for basic tools
mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
    rw: false
}

mount {
    src: "/sbin"
    dst: "/sbin"
    is_bind: true
    rw: false
}

# proc/dev for basic operation
mount {
    src: "/proc"
    dst: "/proc"
    is_bind: true
    rw: false
}

mount {
    dst: "/dev"
    fstype: "tmpfs"
    rw: true
}

mount {
    src: "/dev/null"
    dst: "/dev/null"
    is_bind: true
    rw: true
}

mount {
    src: "/dev/urandom"
    dst: "/dev/urandom"
    is_bind: true
    rw: false
}

# NVIDIA GPU access (for cargo test with GPU features)
# Comment these out if GPU not available
mount {
    src: "/dev/nvidia0"
    dst: "/dev/nvidia0"
    is_bind: true
    rw: true
}

mount {
    src: "/dev/nvidiactl"
    dst: "/dev/nvidiactl"
    is_bind: true
    rw: true
}

mount {
    src: "/dev/nvidia-uvm"
    dst: "/dev/nvidia-uvm"
    is_bind: true
    rw: true
}

# tmp for build artifacts (per-session, isolated)
mount {
    dst: "/tmp"
    fstype: "tmpfs"
    rw: true
    options: "size=4G"
}

# Working directory
cwd: "/build"

# Environment
envar: "PATH=/usr/local/bin:/usr/bin:/bin"
envar: "HOME=/home/oz-relay"
envar: "CARGO_HOME=/home/oz-relay/.cargo"
envar: "RUSTUP_HOME=/home/oz-relay/.rustup"
envar: "CARGO_TARGET_DIR=/tmp/target"

# Resource limits
rlimit_as_type: SOFT
rlimit_cpu_type: SOFT
rlimit_fsize_type: SOFT
rlimit_nofile: 4096

# Max processes
max_cpus: 8

# Log
log_level: WARNING
